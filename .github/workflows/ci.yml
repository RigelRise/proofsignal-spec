# Spec CI — the per-repo gate: the full pytest suite (unit + contract + integration against the
# in-process fake backend; sibling-dependent tests self-skip here and are enforced by the
# cross-repo product-truth gate in the Core repo).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: python -m pip install -e .
      - run: python -m pip install pytest
      - run: python -m pytest -q
